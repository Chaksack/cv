# .github/workflows/deploy.yml
name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-store
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Generate static site
        env:
          # For project pages, the site is served from /<repo>/.
          # For user/org pages (<owner>.github.io), it is served from /.
          NUXT_APP_BASE_URL: ${{ endsWith(github.repository, '.github.io') && '/' || format('/{0}/', github.event.repository.name) }}
          # Used by the client-side copy alert plugin to detect unexpected deployments.
          # Override via repo variable CANONICAL_HOST if you use a custom domain.
          NUXT_PUBLIC_CANONICAL_HOST: ${{ vars.CANONICAL_HOST || format('{0}.github.io', github.repository_owner) }}
          # Optional: set repo variable COPY_ALERT_WEBHOOK to receive alerts.
          NUXT_PUBLIC_COPY_ALERT_WEBHOOK: ${{ vars.COPY_ALERT_WEBHOOK || '' }}
          NITRO_PRESET: github_pages
        run: pnpm run generate

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./.output/public

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
